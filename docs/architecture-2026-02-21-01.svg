<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap');
      .bg { fill: #fcfdfe; }
      .header { font: 700 36px 'Inter', sans-serif; fill: #111827; }
      .subheader { font: 400 18px 'Inter', sans-serif; fill: #6b7280; }
      .group-label { font: 700 15px 'Inter', sans-serif; fill: #4b5563; text-transform: uppercase; letter-spacing: 0.1em; }
      
      .box { stroke-width: 1.5; rx: 16; ry: 16; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05)); }
      .box-core { fill: #eef2ff; stroke: #6366f1; }
      .box-ui { fill: #f0fdf4; stroke: #22c55e; }
      .box-module { fill: #ffffff; stroke: #e2e8f0; }
      .box-service { fill: #fffbeb; stroke: #f59e0b; }
      .box-external { fill: #fff1f2; stroke: #f43f5e; }
      .box-data { fill: #f5f3ff; stroke: #8b5cf6; }

      .label { font: 700 17px 'Inter', sans-serif; fill: #1e293b; }
      .desc { font: 400 13px 'Inter', sans-serif; fill: #475569; }
      .path { font: 400 12px 'monospace'; fill: #94a3b8; }

      .arrow { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .arrow-dashed { stroke: #94a3b8; stroke-width: 2; fill: none; stroke-dasharray: 6 4; marker-end: url(#arrowhead); }
      .arrow-bidir { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrowhead); marker-start: url(#arrowhead); }
    </style>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8" />
    </marker>
  </defs>

  <rect class="bg" width="1600" height="1100" />

  <!-- Header -->
  <text class="header" x="800" y="70" text-anchor="middle">Architektura PolyCredo Editoru</text>
  <text class="subheader" x="800" y="105" text-anchor="middle">Logické schéma komponent a jejich propojení (Stav: 21. 2. 2026)</text>

  <!-- LAYER 1: ENTRY & MANAGEMENT -->
  <text class="group-label" x="100" y="170">Vstupní vrstva &amp; Globální správa</text>
  <line x1="100" y1="185" x2="1500" y2="185" stroke="#f1f5f9" stroke-width="2" />

  <g transform="translate(650, 210)">
    <rect class="box box-core" width="300" height="90" />
    <text class="label" x="150" y="35" text-anchor="middle">AppCore (Main Loop)</text>
    <text class="desc" x="150" y="58" text-anchor="middle">src/app/mod.rs</text>
    <text class="desc" x="150" y="75" text-anchor="middle">Řízení stavu a panelů</text>
  </g>

  <g transform="translate(250, 210)">
    <rect class="box box-module" width="250" height="90" />
    <text class="label" x="125" y="35" text-anchor="middle">IPC &amp; Single Instance</text>
    <text class="desc" x="125" y="65" text-anchor="middle">Komunikace mezi instancemi</text>
  </g>

  <g transform="translate(1100, 210)">
    <rect class="box box-module" width="250" height="90" />
    <text class="label" x="125" y="35" text-anchor="middle">I18n (Fluent)</text>
    <text class="desc" x="125" y="65" text-anchor="middle">Lokalizace rozhraní</text>
  </g>

  <!-- LAYER 2: UI WORKSPACE -->
  <text class="group-label" x="100" y="360">Uživatelské rozhraní (Immediate Mode UI)</text>
  <line x1="100" y1="375" x2="1500" y2="375" stroke="#f1f5f9" stroke-width="2" />

  <!-- UI: Sidebar -->
  <g transform="translate(150, 410)">
    <rect class="box box-ui" width="300" height="350" />
    <text class="label" x="150" y="35" text-anchor="middle">Levý panel (Workspace)</text>
    
    <g transform="translate(25, 60)">
        <rect class="box box-module" width="250" height="80" />
        <text class="label" x="125" y="35" text-anchor="middle">Strom souborů</text>
        <text class="desc" x="125" y="60" text-anchor="middle">Správa souborů a složek</text>
    </g>
    <g transform="translate(25, 160)">
        <rect class="box box-module" width="250" height="80" />
        <text class="label" x="125" y="35" text-anchor="middle">Globální hledání</text>
        <text class="desc" x="125" y="60" text-anchor="middle">Fulltext v projektu</text>
    </g>
    <g transform="translate(25, 260)">
        <rect class="box box-module" width="250" height="60" />
        <text class="label" x="125" y="35" text-anchor="middle">Profil spouštěče</text>
    </g>
  </g>

  <!-- UI: Editor Core -->
  <g transform="translate(500, 410)">
    <rect class="box box-ui" width="600" height="480" />
    <text class="label" x="300" y="35" text-anchor="middle">Hlavní Editor (src/app/ui/editor/)</text>
    <text class="desc" x="300" y="55" text-anchor="middle">Nově rozdělená modulární struktura</text>

    <g transform="translate(40, 80)">
        <rect class="box box-module" width="240" height="100" />
        <text class="label" x="120" y="35" text-anchor="middle">Tabs &amp; Files</text>
        <text class="desc" x="120" y="60" text-anchor="middle">Správa záložek</text>
        <text class="desc" x="120" y="80" text-anchor="middle">I/O operace</text>
    </g>
    <g transform="translate(320, 80)">
        <rect class="box box-module" width="240" height="100" />
        <text class="label" x="120" y="35" text-anchor="middle">Render Normal</text>
        <text class="desc" x="120" y="60" text-anchor="middle">Zobrazování kódu</text>
        <text class="desc" x="120" y="80" text-anchor="middle">Highlighter</text>
    </g>
    <g transform="translate(40, 200)">
        <rect class="box box-module" width="240" height="100" />
        <text class="label" x="120" y="35" text-anchor="middle">LSP Render</text>
        <text class="desc" x="120" y="60" text-anchor="middle">Hover, Autocomplete</text>
        <text class="desc" x="120" y="80" text-anchor="middle">Reference Picker</text>
    </g>
    <g transform="translate(320, 200)">
        <rect class="box box-module" width="240" height="100" />
        <text class="label" x="120" y="35" text-anchor="middle">Markdown Split</text>
        <text class="desc" x="120" y="60" text-anchor="middle">Synchronizované</text>
        <text class="desc" x="120" y="80" text-anchor="middle">scrollování</text>
    </g>
    <g transform="translate(40, 320)">
        <rect class="box box-module" width="520" height="130" />
        <text class="label" x="260" y="40" text-anchor="middle">Pomocné moduly (Helpers &amp; Context)</text>
        <text class="desc" x="260" y="75" text-anchor="middle">Číslování řádků, Context menu,</text>
        <text class="desc" x="260" y="95" text-anchor="middle">Gutter squiggles, Smart typing</text>
    </g>
  </g>

  <!-- UI: Side Panes -->
  <g transform="translate(1150, 410)">
    <rect class="box box-ui" width="300" height="240" />
    <text class="label" x="150" y="35" text-anchor="middle">Spodní / AI panely</text>
    
    <g transform="translate(25, 60)">
        <rect class="box box-module" width="250" height="70" />
        <text class="label" x="125" y="35" text-anchor="middle">AI Terminál</text>
        <text class="desc" x="125" y="55" text-anchor="middle">Context-aware Sync</text>
    </g>
    <g transform="translate(25, 150)">
        <rect class="box box-module" width="250" height="70" />
        <text class="label" x="125" y="35" text-anchor="middle">Build Runner</text>
        <text class="desc" x="125" y="55" text-anchor="middle">Parsování chyb</text>
    </g>
  </g>

  <!-- LAYER 3: SERVICES -->
  <text class="group-label" x="100" y="930">Služby na pozadí &amp; Data</text>
  <line x1="100" y1="945" x2="1500" y2="945" stroke="#f1f5f9" stroke-width="2" />

  <g transform="translate(200, 970)">
    <rect class="box box-service" width="250" height="100" />
    <text class="label" x="125" y="35" text-anchor="middle">LSP Client</text>
    <text class="desc" x="125" y="65" text-anchor="middle">JSON-RPC přes Tokio</text>
    <text class="path" x="125" y="85" text-anchor="middle">rust-analyzer</text>
  </g>

  <g transform="translate(525, 970)">
    <rect class="box box-service" width="250" height="100" />
    <text class="label" x="125" y="35" text-anchor="middle">FS Watcher</text>
    <text class="desc" x="125" y="65" text-anchor="middle">Sledování změn souborů</text>
    <text class="path" x="125" y="85" text-anchor="middle">notify crate</text>
  </g>

  <g transform="translate(850, 970)">
    <rect class="box box-service" width="250" height="100" />
    <text class="label" x="125" y="35" text-anchor="middle">PTY Host</text>
    <text class="desc" x="125" y="65" text-anchor="middle">Pseudo-terminálové procesy</text>
    <text class="path" x="125" y="85" text-anchor="middle">portable-pty</text>
  </g>

  <g transform="translate(1175, 970)">
    <rect class="box box-data" width="250" height="100" />
    <text class="label" x="125" y="35" text-anchor="middle">Projektový Index</text>
    <text class="desc" x="125" y="65" text-anchor="middle">Sdílená cache cest a obsahu</text>
  </g>

  <!-- Connections (Arrows) -->
  
  <!-- Core to UI -->
  <path class="arrow" d="M 800,300 L 800,410" />
  
  <!-- Editor to Services -->
  <path class="arrow-bidir" d="M 650,970 L 450,1020" />
  <path class="arrow-dashed" d="M 1100,500 L 1300,970" />
  
  <!-- Sidebar to Index -->
  <path class="arrow-bidir" d="M 300,760 L 300,910 L 1300,910 L 1300,970" />

  <!-- AI to Terminal -->
  <path class="arrow" d="M 1300,650 L 1300,910 L 975,910 L 975,970" />

</svg>
