[package]
name = "rust_editor"
version = "0.1.0"
edition = "2024"

[dependencies]
eframe = { version = "0.31", features = ["persistence"] }
serde = { version = "1", features = ["derive"] }
syntect = "5"
notify = "7"
rfd = "0.15"
pulldown-cmark = "0.12"
egui_term = "0.1"
alacritty_terminal = "0.25"
dirs = "6"
arboard = { version = "3.6.1", features = ["wayland-data-control"] }
